<div class="addContainer">
    <div class="modalHeader">
        <div class="editRowModal">
            <div class="modalHeader clearfix">
                <div class="modal-about">
                    <div class="font-weight-bold p-t-5 font-17">
                        <b>{{dialogCode}}: {{dialogTitle}}</b>
                    </div>
                </div>
            </div>
        </div>
        <button mat-icon-button (click)="dialogRef.close()" aria-label="Close dialog">
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <div mat-dialog-content>
        <div class="table-responsive">
            <div class="mat-elevation-z8">
                <table class="table table-striped text-center"  >
                    <thead>
                        <th>Unit Code</th>
                        <th>Unit Name</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                    </thead>
                    <tbody>
                        <tr *ngFor="let units of unitsDetail">
                            <td>{{ units.unitCode }}</td>
                            <td>{{ units.unitName  }}</td>
                            <td>{{ units.startDate | date : 'mediumDate' }}</td>
                            <td>{{ units.endDate | date : 'mediumDate' }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

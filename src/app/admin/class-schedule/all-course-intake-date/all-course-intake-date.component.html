    <div class="row">
      <div class="col-md-12">
        <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
          <div class="card">
            <div class="body">
              <div class="table-responsive courseIntake">
                <p class="text-center" *ngIf="error.isError">{{ error.errorMessage }}</p>
                <mat-table #table [dataSource]="dataSource" matSort class="mat-cell">
                  <!-- <ng-container matColumnDef="courseIntakeDateId">
                    <mat-header-cell class="pr-0 mw-10" *matHeaderCellDef>
                      <mat-form-field class="filter" floatLabel="never">
                        <mat-label style="color: white; font-size: 15px;">Id</mat-label>
                        <input matInput [formControl]="courseIdFilter" class="white-cursor" style="color: white">
                      </mat-form-field>
                    </mat-header-cell>
                    <mat-cell class="pr-0 mw-10" *matCellDef="let row" (click)="showInfo(row)" data-toggle="tooltip"
                      data-placement="right" title="click to general info">
                      {{row.courseintakedateid}}
                    </mat-cell>
                  </ng-container> -->
                  <ng-container matColumnDef="courseCode">
                    <mat-header-cell class="pr-0" *matHeaderCellDef>
                      <mat-form-field class="filter" floatLabel="never">
                        <mat-label style="color: white; font-size: 15px;">Course Code</mat-label>
                        <input matInput [formControl]="courseCodeFilter" class="white-cursor">
                      </mat-form-field>
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" (click)="showInfo(row)" data-toggle="tooltip" data-placement="right"
                      title="click to view info">
                      {{row.coursecode}}
                    </mat-cell>
                  </ng-container>
                  <ng-container matColumnDef="courseName">
                    <mat-header-cell class="pr-0" *matHeaderCellDef>
                      <mat-form-field class="filter" floatLabel="never">
                        <mat-label style="color: white; font-size: 15px;">Course Name</mat-label>
                        <input matInput [formControl]="courseNameFilter" class="white-cursor">
                      </mat-form-field>
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" (click)="showInfo(row)" data-toggle="tooltip" data-placement="right"
                      title="click to view info">
                      {{row.coursename}}
                    </mat-cell>
                  </ng-container>
                  <ng-container matColumnDef="startDate">
                    <mat-header-cell class="pr-0" *matHeaderCellDef>
                      <mat-form-field class="filter" floatLabel="never">
                        <mat-label style="color: white; font-size: 15px;">Start Date</mat-label>
                        <input matInput [formControl]="startDateFilter" class="white-cursor">
                      </mat-form-field>
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" (click)="showInfo(row)" data-toggle="tooltip" data-placement="right"
                      title="click to view info">
                      {{row.startdate}}
                    </mat-cell>
                  </ng-container>
                  <ng-container matColumnDef="endDate">
                    <mat-header-cell class="pr-0" *matHeaderCellDef>
                      <mat-form-field class="filter" floatLabel="never">
                        <mat-label style="color: white; font-size: 15px;">End Date</mat-label>
                        <input matInput [formControl]="endDateFilter" class="white-cursor">
                      </mat-form-field>
                    </mat-header-cell>
                    <mat-cell *matCellDef="let row" (click)="showInfo(row)" data-toggle="tooltip" data-placement="right"
                      title="click to view info">
                      {{row.enddate}}
                    </mat-cell>
                  </ng-container>
                  <ng-container matColumnDef="actions">
                    <mat-header-cell class="pr-0" *matHeaderCellDef><mat-label style="color: white; font-size: 15px;">Actions</mat-label></mat-header-cell>
                    <mat-cell *matCellDef="let row; let i=index;" class="pr-0">
                      <button mat-icon-button class="btn-tbl-edit" title="Edit course Info" (click)="editCourseIntake(row.courseintakedateid)">
                        <mat-icon aria-label="Edit" class="col-white">edit</mat-icon>
                      </button>
                      <button mat-icon-button class="btn-tbl-edit" title="Calender" (click)="calender(row.courseintakedateid)">
                        <mat-icon aria-label="Edit" class="col-white">calendar_today</mat-icon>
                      </button>
                      <!-- <button mat-icon-button class="btn-tbl-edit" title="Clone courese intake date" (click)="cloneCourseIntake(row.courseintakedateid)">
                        <mat-icon aria-label="Add" class="col-white">add</mat-icon>
                      </button> -->
                    </mat-cell>
                  </ng-container>
                  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                  <mat-row class="table-row" *matRowDef="let row;let i=index; columns: displayedColumns;"
                    [style.cursor]="'pointer'" matRipple>
                  </mat-row>
                </mat-table>
                <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0" [pageSize]="10" [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

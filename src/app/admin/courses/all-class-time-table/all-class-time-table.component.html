<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="row">
          <div class="col-12">
            <ul class="header-buttons float-end d-inline-flex mb-0">
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="addNew()">
                    <mat-icon class="col-white">add</mat-icon>
                  </button>
                </div>
              </li>
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="refresh()">
                    <mat-icon class="col-white">refresh
                    </mat-icon>
                  </button>
                </div>
              </li>
            </ul>
          </div>
        </div>
        <div class="card">
          <div class="body all-course">
            <mat-sidenav-container class="task-container">
              <mat-sidenav #sidenav [mode]="mode.value" position="end">
                <div class="data-container">
                  <div class="header">
                    <h2 class="header-title">{{ timetablename }}</h2>
                    <div class="header-close m-l-0">
                      <button mat-icon-button (click)="closeSlider(sidenav)">
                        <mat-icon>close</mat-icon>
                      </button>
                    </div>
                  </div>
                  <div class="row m-0">
                    <div class="body table-responsive">
                      <table class="table table-striped">
                        <thead>
                          <tr>
                            <th class="dayofweek">Day Of Week</th>
                            <th class="sttime">Start Time - End Time</th>
                            <!-- <th class="entime">End Time</th> -->
                          </tr>
                        </thead>
                        <!-- <p class="m-auto text-center" *ngIf="timeTable">{{courseUnits.msg}}</p> -->
                        <tbody *ngIf="timeTable?.length >= 0 && timeTable && timeTable?.length">
                          <tr *ngFor="let tt of timeTable">
                            <td class="dayofweek">{{tt.timearray.dayOfWeek}}</td>
                            <td class="endtime">
                              <div *ngFor="let item of tt.timearray.Rows; let j = index; let last = last">
                                <label>{{ item.startTime }} - {{ item.endTime }}</label>
                              </div>
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </mat-sidenav>
              <mat-sidenav-content>
                <div class="table-responsive courses">
                  <mat-table #table [dataSource]="dataSource" matSort class="mat-cell">
                    <ng-container matColumnDef="classtimetableid">
                      <mat-header-cell class="pr-0" *matHeaderCellDef>
                        <mat-label style="color: white; font-size: 15px;">ID</mat-label>
                      </mat-header-cell>
                      <mat-cell *matCellDef="let row" data-toggle="tooltip"
                        data-placement="right">{{row.classtimetablenameid}}</mat-cell>
                    </ng-container>
                    <ng-container matColumnDef="classtimetablename">
                      <mat-header-cell class="pr-0" *matHeaderCellDef>
                        <mat-label style="color: white; font-size: 15px;">Class Time Table Name</mat-label>
                      </mat-header-cell>
                      <mat-cell *matCellDef="let row" data-toggle="tooltip"
                        data-placement="right">{{row.timetablename}}</mat-cell>
                    </ng-container>
                    <ng-container matColumnDef="actions">
                      <mat-header-cell class="pr-0" *matHeaderCellDef>
                        <mat-label style="color: white; font-size: 15px;">Actions</mat-label>
                      </mat-header-cell>
                      <mat-cell *matCellDef="let row; let i=index;" class="pr-0">
                        <button mat-icon-button class="btn-tbl-edit" title="Show Units"
                          (click)="taskClick(i, row.classtimetablenameid, row.timetablename, sidenav)">
                          <span class="material-icons-outlined" style="font-size: 19px; color: white;">
                            fact_check</span>
                        </button>
                      </mat-cell>
                    </ng-container>
                    <mat-header-row *matHeaderRowDef="displayedColumns"> </mat-header-row>
                    <mat-row class="table-row" [class.focus]="highlighter === i" tabindex="1"
                      *matRowDef="let row;let i=index; columns: displayedColumns;" [style.cursor]="'pointer'"
                      matRipple></mat-row>
                  </mat-table>
                  <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0" [pageSize]="10"
                    [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
                </div>
              </mat-sidenav-content>
            </mat-sidenav-container>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

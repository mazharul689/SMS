    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="row">
          <div class="col-12">
            <ul class="header-buttons float-end d-inline-flex mb-0">
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="addNew()">
                    <mat-icon class="col-white">add</mat-icon>
                  </button>
                </div>
              </li>
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="refresh()">
                    <mat-icon class="col-white">refresh
                    </mat-icon>
                  </button>
                </div>
              </li>
            </ul>
          </div>
        </div>
        <div class="card">
          <div class="body">
            <div class="table-responsive courseIntake">
              <p class="text-center" *ngIf="error.isError">{{ error.errorMessage }}</p>
              <mat-table #table [dataSource]="dataSource" matSort class="mat-cell">
                <!-- <ng-container matColumnDef="courseIntakeDateId">
                  <mat-header-cell class="pr-0 mw-10" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label>Id</mat-label>
                      <input matInput [formControl]="courseIdFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell class="pr-0 mw-10" *matCellDef="let row"  data-toggle="tooltip"
                    data-placement="right" title="click to general info">
                    {{row.courseintakedateid}}
                  </mat-cell>
                </ng-container> -->
                <ng-container matColumnDef="courseCode">
                  <mat-header-cell class="pr-0" *matHeaderCellDef style="font-size: 13px !important;">
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Course Code</mat-label>
                      <input matInput [formControl]="courseCodeFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row"  data-toggle="tooltip" data-placement="right"
                    >
                    {{row.coursecode}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="courseName">
                  <mat-header-cell class="pr-0" *matHeaderCellDef  style="font-size: 13px !important;">
                    <mat-form-field class="filter" floatLabel="never" style="width: 250px !important;">
                      <mat-label style="color: white; font-size: 15px;">Certificte Course Name</mat-label>
                      <input matInput [formControl]="courseNameFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row"  data-toggle="tooltip" data-placement="right"
                    >
                    {{row.certificatecoursename}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="className">
                  <mat-header-cell class="pr-0" *matHeaderCellDef  style="font-size: 13px !important;">
                    <mat-form-field class="filter" floatLabel="never" >
                      <mat-label style="color: white; font-size: 15px;">Class Name</mat-label>
                      <input matInput [formControl]="classNameFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row"  data-toggle="tooltip" data-placement="right"
                    >
                    {{row.classname}}
                  </mat-cell>
                </ng-container>
                <!-- <ng-container matColumnDef="batchName">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Batch Name</mat-label>
                      <input matInput [formControl]="batchNameFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row"  data-toggle="tooltip" data-placement="right"
                    >
                    {{row.batchname}}
                  </mat-cell>
                </ng-container> -->
                <ng-container matColumnDef="startDate">
                  <mat-header-cell class="pr-0" *matHeaderCellDef style="font-size: 13px !important;">
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Start Date</mat-label>
                      <input matInput [formControl]="startDateFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row"  data-toggle="tooltip" data-placement="right"
                    >
                    {{row.startdate}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="endDate">
                  <mat-header-cell class="pr-0" *matHeaderCellDef style="font-size: 13px !important;">
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">End Date</mat-label>
                      <input matInput [formControl]="endDateFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row"  data-toggle="tooltip" data-placement="right"
                    >
                    {{row.enddate}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="actions">
                  <mat-header-cell class="pr-0" *matHeaderCellDef><mat-label style="color: white; font-size: 15px;">Actions</mat-label></mat-header-cell>
                  <mat-cell *matCellDef="let row; let i=index;" class="pr-0">
                    <button mat-icon-button class="btn-tbl-edit" title="Edit course Intake Date"
                      (click)="editCourseIntake(row.courseintakedateid)">
                      <mat-icon aria-label="Edit" class="col-white">edit</mat-icon>
                    </button>
                    <button mat-icon-button class="btn-tbl-edit" title="Class Schedule"
                      (click)="classSchedule(row.courseintakedateid)">
                      <mat-icon aria-label="Edit" class="col-white">schedule</mat-icon>
                    </button>
                    <button mat-icon-button class="btn-tbl-edit" title="New Student Enrollment"
                      (click)="newStudentEnrollment(row.courseintakedateid)">
                      <mat-icon aria-label="Edit" class="col-white">person_add</mat-icon>
                    </button>
                    <button mat-icon-button class="btn-tbl-edit" title="Clone courese intake date"
                      (click)="cloneCourseIntake(row.courseintakedateid)">
                      <mat-icon aria-label="Add" class="col-white">add</mat-icon>
                    </button>
                    <button mat-icon-button class="btn-tbl-edit" title="Exclude the course intake"
                      (click)="deleteCourseIntake(row.courseintakedateid)">
                      <mat-icon aria-label="Delete" style="color: red;">delete</mat-icon>
                    </button>
                  </mat-cell>
                </ng-container>
                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row class="table-row" *matRowDef="let row;let i=index; columns: displayedColumns;"
                  [style.cursor]="'pointer'" matRipple>
                </mat-row>
              </mat-table>
              <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0" [pageSize]="10"
                [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

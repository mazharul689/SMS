<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="row">
          <div class="col-12">
            <ul class="header-buttons float-end d-inline-flex mb-0">
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="addNew()">
                    <mat-icon class="col-white">add</mat-icon>
                  </button>
                </div>
              </li>
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="refresh()">
                    <mat-icon class="col-white">refresh
                    </mat-icon>
                  </button>
                </div>
              </li>
            </ul>
          </div>
        </div>

        <div class="card">
          <div class="body">
            <div class="table-responsive units">
              <mat-table #table [dataSource]="dataSource" matSort class="mat-cell">
                <ng-container matColumnDef="staffId">
                  <mat-header-cell class="pr-0 mw-10" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Staff ID</mat-label>
                      <input matInput [formControl]="staffIdFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell class="pr-0 mw-10" *matCellDef="let row">
                    {{row.staffid}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="firstName">
                  <mat-header-cell class="pr-0 mw-10" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Staff ID</mat-label>
                      <input matInput [formControl]="firstNameFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell class="pr-0 mw-10" *matCellDef="let row">
                    {{row.firstname}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="lastName">
                  <mat-header-cell class="pr-0 mw-10" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Staff ID</mat-label>
                      <input matInput [formControl]="lastNameFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell class="pr-0 mw-10" *matCellDef="let row">
                    {{row.lastname}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="email">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <div class="searchcolumn">
                      <mat-form-field class="filter" floatLabel="never">
                        <mat-label style="color: white; font-size: 15px;">Email</mat-label>
                        <input matInput [formControl]="emailFilter">
                      </mat-form-field>
                    </div>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.email}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="isactive">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <div class="searchcolumn">
                      <mat-form-field class="filter" floatLabel="never">
                        <mat-label style="color: white; font-size: 15px;">Is Active?</mat-label>
                        <input matInput [formControl]="isactiveFilter">
                      </mat-form-field>
                    </div>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    <label *ngIf="row.isactive == 'Y' || row.isactive == '1'" style="text-align: center;">YES</label>
                    <label *ngIf="row.isactive == 'N'" style="text-align: center;">NO</label>
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="actions">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-label style="color: white; font-size: 15px;">Actions</mat-label></mat-header-cell>
                  <mat-cell *matCellDef="let row; let i=index;" class="pr-0">
                    <button mat-icon-button class="btn-tbl-edit" title="Edit Info" (click)="editUser(row.staffid)">
                      <mat-icon aria-label="Edit" class="col-white">edit</mat-icon>
                    </button>
                  </mat-cell>
                </ng-container>
                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row class="table-row" *matRowDef="let row;let i=index; columns: displayedColumns;"
                  [style.cursor]="'pointer'" matRipple>
                </mat-row>
              </mat-table>
              <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0" [pageSize]="10"
                [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

    <div class="row clearfix editStudent">
      <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
        <div class="card">
          <div class="header">
            <h2>Attendance</h2>
          </div>
          <div class="body">
            <div class="row">
              <div *ngIf="errorsReq.isError" class="col-4 alert alert-danger m-auto text-center" id="closebtntr">
                <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                <strong>Warning!</strong> {{ errorsReq.errorMessage }}
              </div>
            </div>
            <div class="row">
              <div *ngIf="attendanceFound.isError" class="col-4 alert alert-danger m-auto text-center" id="closebtntr">
                <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                <strong>Warning!</strong> {{ attendanceFound.errorMessage }}
              </div>
            </div>
            <form [formGroup]="HFormGroup1">
              <div class="mt-4">
                <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                  <div class="card">
                    <div class="body table-responsive trainingAct">
                      <div class="table table-striped">
                        <div class="table-head row">
                          <div class="head-col-clientId1">
                            <mat-label style="color: white; font-size: 15px;">Client Id</mat-label>
                          </div>
                          <div class="head-col-fullName">
                            <mat-label style="color: white; font-size: 15px;">Student Name</mat-label>
                          </div>
                          <div class="head-col-classDate">
                            <mat-form-field class="example-full-width mb-2">
                              <mat-label>Class Date</mat-label>
                              <input matInput [matDatepicker]="thSdPicker" (ngModelChange)="cDateChange($event)"
                                [(ngModel)]="clDate" [ngModelOptions]="{standalone: true}">
                              <mat-datepicker-toggle matSuffix [for]="thSdPicker">
                              </mat-datepicker-toggle>
                              <mat-datepicker #thSdPicker>
                              </mat-datepicker>
                            </mat-form-field>
                          </div>

                          <div class="head-col-attendance">
                            <mat-label
                              style="color: white; font-size: 15px; display: flex; justify-content: center; align-items: center; padding-right: 20px;">Attendance</mat-label>
                            <mat-radio-group
                              style="color: white; display: flex; justify-content: center; align-items: center;">
                              <mat-radio-button value="P" (change)="AttendanceBulkSet($event)"><label
                                  style="color: white;">Present</label></mat-radio-button>
                              <mat-radio-button value="A" (change)="AttendanceBulkSet($event)"><label
                                  style="color: white;">Absent</label></mat-radio-button>
                            </mat-radio-group>
                          </div>

                        </div>
                        <div formArrayName="FirstRows" *ngIf="this.studentAttendance.length > 0">
                          <div *ngFor="let row of HFormGroup1.get('FirstRows')['controls']; let i=index">
                            <div class="table-body row" [formGroupName]="i">
                              <div class="body-col-clientId1">
                                <mat-label>{{row.get('clientid').value}}</mat-label>
                              </div>
                              <div class="body-col-fullName">
                                <mat-label>{{row.get('fullname').value}}</mat-label>
                              </div>
                              <div class="body-col-classDate" *ngIf="this.studentAttendance.length > 0">
                                <mat-form-field class="example-full-width mb-2">
                                  <mat-label>Class Date</mat-label>
                                  <input matInput [matDatepicker]="sDpicker" formControlName="classDate"
                                    [value]="clDate" readonly>
                                  <mat-datepicker-toggle matSuffix [for]="sDpicker" disabled>
                                  </mat-datepicker-toggle>
                                  <mat-datepicker #sDpicker>
                                  </mat-datepicker>
                                </mat-form-field>
                              </div>
                              <div class="body-col-attendance" *ngIf="this.studentAttendance.length > 0">
                                <mat-radio-group formControlName="attendanceStatusId">
                                  <mat-radio-button value="P"
                                    [checked]="this.HFormGroup1.value.studentAttendanceId == 'P'">Present</mat-radio-button>
                                  <mat-radio-button value="A"
                                    [checked]="this.HFormGroup1.value.studentAttendanceId == 'A'">Absent</mat-radio-button>
                                </mat-radio-group>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div>
                <button *ngIf="!updateCheck" mat-raised-button class="msr-5" color="primary"
                  (click)="onSaveAttendance()">Save</button>
                <button *ngIf="updateCheck" mat-raised-button class="msr-5" color="primary"
                  (click)="onAttendanceUpdate()">Update</button>
              </div>
            </form>

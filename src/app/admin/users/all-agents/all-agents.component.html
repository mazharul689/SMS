<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="row">
          <div class="col-12">
            <ul class="header-buttons float-end d-inline-flex mb-0">
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="addNew()">
                    <mat-icon class="col-white">add</mat-icon>
                  </button>
                </div>
              </li>
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="refresh()">
                    <mat-icon class="col-white">refresh
                    </mat-icon>
                  </button>
                </div>
              </li>
            </ul>
          </div>
        </div>

        <div class="card">
          <div class="body">
            <div class="table-responsive units">
              <mat-table #table [dataSource]="dataSource" matSort class="mat-cell">
                <ng-container matColumnDef="agencyname">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Agency Name</mat-label>
                      <input matInput [formControl]="agencyNameFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell class="pr-0" *matCellDef="let row">
                    {{row.agencyname}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="contactperson">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Contact Person</mat-label>
                      <input matInput [formControl]="contactPersonFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.contactperson}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="isactive">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Is Active?</mat-label>
                      <input matInput [formControl]="isActiveFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    <label *ngIf="row.isactive == 'Y' || row.isactive == '1'" style="text-align: center;">YES</label>
                    <label *ngIf="row.isactive == 'N'" style="text-align: center;">NO</label>
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="telephone">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Telephone</mat-label>
                      <input matInput [formControl]="telephoneFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.telephone}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="mobile">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Mobile</mat-label>
                      <input matInput [formControl]="mobileFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.mobile}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="actions">

                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-label style="color: white; font-size: 15px;">Actions</mat-label>

                  </mat-header-cell>
                  <mat-cell *matCellDef="let row; let i=index;" class="pr-0">
                    <button mat-icon-button class="btn-tbl-edit" title="Edit Info" (click)="editAgent(row.agentid)">
                      <mat-icon aria-label="Edit" class="col-white">edit</mat-icon>
                    </button>
                    <button mat-icon-button class="btn-tbl-edit" title="Exclude the student from enrollment"
                      (click)="deleteAgent(row)">
                      <mat-icon aria-label="Delete" style="color: red;">delete</mat-icon>
                    </button>
                  </mat-cell>
                </ng-container>
                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row class="table-row" *matRowDef="let row;let i=index; columns: displayedColumns;"
                  [style.cursor]="'pointer'" matRipple>
                </mat-row>
              </mat-table>
              <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0" [pageSize]="10"
                [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

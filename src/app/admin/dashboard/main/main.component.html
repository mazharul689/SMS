    <div class="row clearfix">
      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <mat-expansion-panel [expanded]="panelExpanded">
          <mat-expansion-panel-header>
            All Students ({{this.totalStudent}})
          </mat-expansion-panel-header>
          <div class="body">
            <div class="courseIntake">
              <mat-table #table [dataSource]="dataSource" matSort #tableTwoSort="matSort" class="mat-cell">
                <ng-container matColumnDef="bulkClientId">
                  <mat-header-cell class="pr-0 mw-10" *matHeaderCellDef style="font-size: 13px !important;">
                    <mat-form-field class="filter" floatLabel="never" style="width: 95px;">
                      <mat-label style="color: white; font-size: 15px;">Client Id</mat-label>
                      <input matInput [formControl]="clientIdFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row; let i=index">
                    <span class="ml-2">{{row.clientid}}</span>
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="bulkName">
                  <mat-header-cell class="pr-0" *matHeaderCellDef style="font-size: 13px !important;">
                    <mat-form-field class="filter" floatLabel="never" style="width: 140px;">
                      <mat-label style="color: white; font-size: 15px;">Name</mat-label>
                      <input matInput [formControl]="nameFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row; let i=index">
                    <span class="ml-2">{{row.firstname}}</span>
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="bulkEmail">
                  <mat-header-cell class="pr-0" *matHeaderCellDef style="font-size: 13px !important;">
                    <mat-form-field class="filter" floatLabel="never" style="width: 140px;">
                      <mat-label style="color: white; font-size: 15px;">E-mail</mat-label>
                      <input matInput [formControl]="emailFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row; let i=index">
                    <div class="row">
                      <span>{{row.email}}</span>
                    </div>
                  </mat-cell>
                </ng-container>

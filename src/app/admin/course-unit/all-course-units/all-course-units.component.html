<section class="content">
  <div class="container-fluid">
    <div class="block-header">
      <div class="row">
        <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
          <ul class="breadcrumb breadcrumb-style pb-0">
            <li class="breadcrumb-item">
              <h4 class="page-title mb-0">All Course Units</h4>
            </li>
            <li class="breadcrumb-item bcrumb-1">
              <a routerLink="/admin/dashboard/main">
                <i class="fas fa-home"></i>Course Units</a>
            </li>
            <li class="breadcrumb-item bcrumb-2">
              <a href="#" onClick="return false;">Course Units</a>
            </li>
            <li class="breadcrumb-item active">All</li>
          </ul>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="row">
          <div class="col-12">
            <ul class="header-buttons float-end d-inline-flex mb-0">
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="addNew()">
                    <mat-icon class="col-white">add</mat-icon>
                  </button>
                </div>
              </li>
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" (click)="refresh()">
                    <mat-icon class="col-white">refresh
                    </mat-icon>
                  </button>
                </div>
              </li>
            </ul>
          </div>
        </div>

        <div class="card">
          <div class="body">
            <div class="table-responsive courseUnits">
              <mat-table #table [dataSource]="dataSource" matSort class="mat-cell">
                <ng-container matColumnDef="unitCode">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Unit Code</mat-label>
                      <input matInput [formControl]="unitCodeFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell class="pr-0" *matCellDef="let row">
                    {{row.unitcode}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="unitName">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never">
                      <mat-label style="color: white; font-size: 15px;">Unit Name</mat-label>
                      <input matInput [formControl]="unitNameFilter" class="white-cursor">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.unitname}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="unitType">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-label style="color: white; font-size: 15px;">Unit Type</mat-label></mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    <span *ngIf="row.unittype == 'C'">Core</span>
                    <span *ngIf="row.unittype == 'E'">Elective</span>
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="AVETMISS">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-label style="color: white; font-size: 15px;">AVETMISS</mat-label></mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    <span *ngIf="row.avetmiss == 'Y'">Yes</span>
                    <span *ngIf="row.avetmiss == 'N'">No</span>
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="actions">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-label style="color: white; font-size: 15px;">Actions</mat-label></mat-header-cell>
                  <mat-cell *matCellDef="let row; let i=index;" class="pr-0">
                    <button mat-icon-button class="btn-tbl-edit" title="Edit Info"
                      (click)="editCourseUnit(row.courseid)">
                      <mat-icon aria-label="Edit" class="col-white">edit</mat-icon>
                    </button>
                    <button mat-icon-button class="btn-tbl-edit" title="Delete Course Unit"
                      (click)="deleteCourseUnit(row.courseunitid)">
                      <mat-icon aria-label="Delete" style="color: red;">delete</mat-icon>

                    </button>
                  </mat-cell>
                </ng-container>
                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row class="table-row" *matRowDef="let row;let i=index; columns: displayedColumns;"
                  [style.cursor]="'pointer'" matRipple>
                </mat-row>
              </mat-table>
              <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0" [pageSize]="10"
                [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

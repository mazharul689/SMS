      <div class="row clearfix newStudent">
        <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
          <div class="card">
              <div class="header">
                  <h2>Edit Venue</h2>
              </div>
              <div class="body">
                  <div class="container">
                      <div class="row">
                          <div *ngIf="requiredError.isError" class="alert alert-danger col-6 m-auto" id="closebtn">
                              <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                              <strong>Warning!</strong> {{ requiredError.errorMessage }}
                          </div>
                      </div>
                      <div class="row">
                          <div *ngIf="dateValidate.isError" class="alert alert-danger col-4 m-auto" id="closebtn">
                              <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                              <strong>Warning!</strong> {{ dateValidate.errorMessage }}
                          </div>
                      </div>
                      <form [formGroup]="HFormGroup1">
                        <div class="row">
                            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                            <mat-form-field class="example-full-width mb-3">
                                <mat-label>Venue</mat-label>
                                <mat-select formControlName="venueId" required>
                                    <mat-option *ngFor="let venue of venues" [value]="venue.venueid">
                                        {{venue.venuename}}
                                    </mat-option>
                                </mat-select>
                                <mat-error *ngIf="HFormGroup1.get('venueId').hasError('required')">
                                    Venue is required
                                </mat-error>
                            </mat-form-field>
                            </div>
                            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                            <mat-form-field class="example-full-width mb-3">
                                <mat-label>Room Number</mat-label>
                                <input matInput formControlName="roomNumber" type="text" required>
                                <mat-error *ngIf="HFormGroup1.get('roomNumber').hasError('required')">
                                    Room Number is required
                                </mat-error>
                                <mat-error *ngIf="HFormGroup1.get('roomNumber').hasError('maxlength')">
                                    Maximum length is 10
                                </mat-error>
                            </mat-form-field>
                            </div>
                        </div>
                          <div class="row">
                              <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
                              <mat-form-field class="example-full-width mb-3">
                                  <mat-label>Room Name</mat-label>
                                  <input matInput formControlName="roomName" type="text">
                              </mat-form-field>
                              </div>
                              
                          </div>
                         
                          
                      <div>
                          <button mat-raised-button color="primary" (click)="onRoomUpdate()">Update</button>
                      </div>
                      </form>
                  </div>
              </div>
          </div>
        </div>
      </div>
    </div>
  </section>

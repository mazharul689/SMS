<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
        <div class="row">
          <div class="col-12">
            <ul class="header-buttons float-end d-inline-flex mb-0">
              <li>
                <div class="icon-button-demo">
                  <button mat-mini-fab color="primary" matTooltip="Add New Receipt" (click)="testByMazhar()">
                    <mat-icon class="col-white">receipt</mat-icon>
                  </button>
                </div>
              </li>
            </ul>
          </div>
        </div>

        <div class="card">
          <div class="body">
            <div class="table-responsive units">
              <mat-table #table [dataSource]="dataSource" matSort class="mat-cell">
                <ng-container matColumnDef="clientId">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-form-field class="filter" floatLabel="never" style="width: 65px;">
                      <mat-label style="color: white; font-size: 15px;">Client Id</mat-label>
                      <input matInput style="color: white;" class="white-cursor" [formControl]="clientIdFilter">
                    </mat-form-field>
                  </mat-header-cell>
                  <mat-cell class="pr-0" *matCellDef="let row">
                    {{row.clientid}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="name">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <div class="searchcolumn">
                      <mat-form-field class="filter" floatLabel="never" style="width: 105px;">
                        <mat-label style="color: white; font-size: 15px;">Students Name</mat-label>
                        <input matInput style="color: white;" class="white-cursor" [formControl]="nameFilter">
                      </mat-form-field>
                    </div>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.name}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="courseCode">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <div class="searchcolumn">
                      <mat-form-field class="filter" floatLabel="never" style="width: 105px;">
                        <mat-label style="color: white; font-size: 15px;">Course Code</mat-label>
                        <input matInput style="color: white;" class="white-cursor" [formControl]="courseCodeFilter">
                      </mat-form-field>
                    </div>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.coursecode}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="courseName">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <div class="searchcolumn">
                      <mat-form-field class="filter" floatLabel="never" style="width: 255px;">
                        <mat-label style="color: white; font-size: 15px;">Course Name</mat-label>
                        <input matInput style="color: white;" class="white-cursor" [formControl]="courseNameFilter">
                      </mat-form-field>
                    </div>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.coursename}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="totalFee">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-label style="color: white; font-size: 15px;">Total Fee</mat-label>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.totalfee}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="totalPaidAmount">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-label style="color: white; font-size: 15px;">Total Paid Amount</mat-label>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.totalamountpaid}}
                  </mat-cell>
                </ng-container>
                <ng-container matColumnDef="totalDueAmount">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-label style="color: white; font-size: 15px;">Total Due Amount</mat-label>
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{row.invoiceddueamount}}
                  </mat-cell>
                </ng-container>
                <!-- <ng-container matColumnDef="totalFee">
                  <mat-header-cell class="pr-0" *matHeaderCellDef>
                    <mat-label style="color: white; font-size: 15px;">Total Fee</mat-label>

                  </mat-header-cell>
                  <mat-cell *matCellDef="let row; let i=index;" class="pr-0">
                    <button mat-icon-button class="btn-tbl-edit" title="Edit Info"
                      (click)="editUnit(row.unitid)">
                      <mat-icon aria-label="Edit" class="col-white">edit</mat-icon>
                    </button>
                  </mat-cell>
                </ng-container> -->
                <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
                <mat-row class="table-row" *matRowDef="let row;let i=index; columns: displayedColumns;"
                  [style.cursor]="'pointer'" matRipple>
                </mat-row>
              </mat-table>
              <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0" [pageSize]="10"
                [pageSizeOptions]="[5, 10, 25, 100]"></mat-paginator>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

    <div class="container-fluid">

        <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
                <div class="card">
                    <div class="body allStudent">
                        <mat-sidenav-container class="task-container">
                            <mat-sidenav-content>
                                <div class="table-responsive all_Student">
                                    <div class="materialTableHeader">
                                        <div class="row m-auto">
                                            <div class="col-9"></div>
                                            <div class="col-3">
                                                <ul class="header-buttons">
                                                    <li>
                                                        <div class="icon-button-demo">
                                                            <button mat-mini-fab color="primary" (click)="newMessage(this.firstName,this.studentID)">
                                                                <mat-icon class="col-white">add</mat-icon>
                                                            </button>
                                                        </div>
                                                    </li>
                                                    <li>
                                                        <div class="icon-button-demo">
                                                            <button mat-mini-fab color="primary">
                                                                <mat-icon class="col-white">refresh</mat-icon>
                                                            </button>
                                                        </div>
                                                    </li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                    <mat-table #table [dataSource]="dataSource" matSort class="mat-cell" >
                                        <ng-container matColumnDef="type">
                                            <mat-header-cell *matHeaderCellDef
                                                style="min-height: unset; background: #3F51B5;"
                                                style="background: #3F51B5">
                                                <mat-label style="color: white;">Type</mat-label>
                                            </mat-header-cell>
                                            <mat-cell *matCellDef="let row" data-toggle="tooltip"
                                                data-placement="right">
                                                <span>{{row.type}}</span>
                                                <!-- <mat-label *ngIf="row.communicationType == 'E'">E-mail</mat-label>
                                                <mat-label *ngIf="row.communicationType == 'S'">SMS</mat-label> -->
                                            </mat-cell>
                                        </ng-container>
                                        <ng-container matColumnDef="subject">
                                            <mat-header-cell *matHeaderCellDef style="background: #3F51B5;">
                                                <mat-label style="color: white;">Subject</mat-label>
                                            </mat-header-cell>
                                            <mat-cell *matCellDef="let row" data-toggle="tooltip" data-placement="right">
                                                {{row.subject}}
                                            </mat-cell>
                                        </ng-container>
                                        <ng-container matColumnDef="message">
                                            <mat-header-cell *matHeaderCellDef style="background: #3F51B5;">
                                              <mat-label style="color: white;">Message</mat-label>
                                            </mat-header-cell>
                                            <mat-cell *matCellDef="let row" data-toggle="tooltip" data-placement="right" >
                                              <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{row.msg}}</span>

                                            </mat-cell>
                                          </ng-container>
                                          
                                        <ng-container matColumnDef="attachment">
                                            <mat-header-cell *matHeaderCellDef style="background: #3F51B5;">
                                                <mat-label style="color: white;">Attachment</mat-label>
                                            </mat-header-cell>
                                            <mat-cell *matCellDef="let row" data-toggle="tooltip" data-placement="right">
                                                    <span *ngIf="row.email_attachment"style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                                        <button type="button" mat-icon-button color="primary" (click)="download(row.email_attachment)">
                                                            <i class="fa fa-download"></i>
                                                        </button>
                                                        {{row.filename}}<br>
                                                    </span>
                                                    <!-- <span *ngIf="row.email_attachment" *ngFor="let url of row.email_attachment; let i = index">
                                                        <button type="button" mat-icon-button color="primary" (click)="download(row.rowID,i)">
                                                            <i class="fa fa-download"></i>
                                                        </button>
                                                        {{url}}<br>
                                                    </span> -->
                                                <!-- </div> -->
                                                <!-- {{row.attachmentUrl}} -->
                                            </mat-cell>
                                        </ng-container>
                                        <ng-container matColumnDef="date">
                                            <mat-header-cell *matHeaderCellDef style="background: #3F51B5;">
                                                <mat-label style="color: white;">Date</mat-label>
                                            </mat-header-cell>
                                            <mat-cell *matCellDef="let row" data-toggle="tooltip" data-placement="right">
                                                {{row.date}}
                                            </mat-cell>
                                        </ng-container>
                                        <ng-container matColumnDef="actions1">
                                            <mat-header-cell class="pr-0" *matHeaderCellDef style="background: #3F51B5;">
                                                <mat-label style="color: white;">Actions</mat-label>
                                            </mat-header-cell>
                                            <mat-cell *matCellDef="let row; let i=index;" class="pr-0">
                                                <button mat-icon-button class="btn-tbl-edit" title="view detailed message" (click)="viewMail(row)">
                                                    <mat-icon aria-label="Edit" class="col-white">description</mat-icon>
                                                </button>
                                                <!-- <button mat-icon-button class="btn-tbl-veiw-enrol" title="Add Course" (click)="addEnrCourse(studentId)">
                                                    <mat-icon aria-label="Add" style="color:blue" class="col-white">add_course</mat-icon>
                                                </button> -->
                                                <!-- <div class="icon-button-demo">
                                                    <button mat-mini-fab color="primary" (click)="addEnrCourse(studentId)">
                                                        <mat-icon class="col-white">add</mat-icon>
                                                    </button>
                                                </div> -->
                                            </mat-cell>
                                        </ng-container>
                                        <mat-header-row *matHeaderRowDef="displayedColumns"> </mat-header-row>
                                        <mat-row class="table-row" [class.focus]="highlighter === i" tabindex="1"
                                            *matRowDef="let row;let i=index; columns: displayedColumns;"
                                            [style.cursor]="'pointer'" matRipple></mat-row>
                                    </mat-table>
                                    <mat-paginator #paginator [length]="dataSource.filteredData.length" [pageIndex]="0"
                                        [pageSize]="10" [pageSizeOptions]="[5, 10, 25, 100]">
                                    </mat-paginator>
                                </div>
                            </mat-sidenav-content>
                        </mat-sidenav-container>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
